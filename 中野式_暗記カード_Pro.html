<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>暗記カード</title>
<style>
html,body{
  margin:0;padding:0;width:100%;height:100%;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff;
}
#setup{
  padding:12px;
}
textarea{
  width:100%;
  height:120px;
  font-size:18px;
  box-sizing:border-box;
}
#viewer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
}
#card{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:72px 1fr 72px;
  align-items:stretch;
}
.nav{
  border:none;
  background:#f2f2f2;
  font-size:38px;
}
#text{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  font-size:clamp(32px,6vw,60px);
  user-select:none;
  word-break:break-word;
}
#exit{
  position:fixed;
  top:10px;
  right:10px;
  z-index:10;
  padding:10px 14px;
}
@media (orientation:landscape){
  #text{
    font-size:clamp(38px,5vw,72px);
    padding:40px;
  }
  .nav{
    font-size:48px;
  }
}
</style>
</head>
<body>

<div id="setup">
<h2>暗記カード</h2>
<textarea id="txt" placeholder="example|例・実例&#10;look for|探す"></textarea><br><br>
<button onclick="loadCards()">読み込む</button>
<button onclick="start()">全画面表示</button>
</div>

<div id="viewer">
<button id="exit" onclick="exitView()">終了</button>
<div id="card">
<button class="nav" onclick="event.stopPropagation();prev()">◀</button>
<div id="text" onclick="flip()">カードなし</div>
<button class="nav" onclick="event.stopPropagation();next()">▶</button>
</div>
</div>

<script>
let cards=JSON.parse(localStorage.getItem("cards")||"[]");
let i=0,front=true;

function show(){
 text.textContent=cards.length?(front?cards[i][0]:cards[i][1]):"カードなし";
}
function loadCards(){
 cards=txt.value.trim().split(/\n+/).map(x=>x.split("|")).filter(x=>x.length>=2);
 localStorage.setItem("cards",JSON.stringify(cards));
 i=0;front=true;show();
}
function flip(){if(cards.length){front=!front;show();}}
function next(){if(cards.length){i=(i+1)%cards.length;front=true;show();}}
function prev(){if(cards.length){i=(i-1+cards.length)%cards.length;front=true;show();}}

async function start(){
 viewer.style.display="block";
 setup.style.display="none";
 show();
 const el=document.documentElement;
 if(el.requestFullscreen){
   try{await el.requestFullscreen();}catch(e){}
 }
}
async function exitView(){
 if(document.fullscreenElement){
   try{await document.exitFullscreen();}catch(e){}
 }
 viewer.style.display="none";
 setup.style.display="block";
}
show();
</script>

</body>
</html>
